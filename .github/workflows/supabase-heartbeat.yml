name: Supabase Heartbeat

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Insert keepalive row
        env:
          SUPABASE_URL: https://koxfmngebugdkfzvnphp.supabase.co
          SUPABASE_PUBLISHABLE_KEY: sb_publishable_n7M8G8Jl5gurGMN1gr1sDg_sWM6X6cL
        run: |
          stamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          payload=$(printf '[{"name":"System Heartbeat","email":"heartbeat@zeydesign.online","subject":"__heartbeat__","message":"Daily keepalive ping at %s"}]' "$stamp")

          curl --fail-with-body --silent --show-error \
            --request POST \
            --url "$SUPABASE_URL/rest/v1/customer_messages" \
            --header "apikey: $SUPABASE_PUBLISHABLE_KEY" \
            --header "Authorization: Bearer $SUPABASE_PUBLISHABLE_KEY" \
            --header "Content-Type: application/json" \
            --header "Prefer: return=minimal" \
            --data "$payload"
